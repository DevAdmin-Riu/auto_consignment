services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - ./data:/home/node/.n8n
      - .:/home/node/vendor-automation
    environment:
      - TZ=Asia/Seoul
      # OAuth 콜백 URL (ngrok 사용 시)
      - WEBHOOK_URL=https://resolutive-naoma-unideographically.ngrok-free.dev/
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_ALLOW_ENV_ACCESS=AUTH_TOKEN,GRAPHQL_URL,CONTENT_TYPE,MALL_URL
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Allow external npm modules in Code node
      - NODE_FUNCTION_ALLOW_EXTERNAL=xlsx,xlsx-js-style
      # GraphQL API (아래 중 하나 선택)
      - GRAPHQL_URL=https://resolutive-naoma-unideographically.ngrok-free.dev/graphql/ # 로컬 (ngrok 통해 맥북 연결)
      # - GRAPHQL_URL=http://host.docker.internal:8080/graphql/ # 로컬 (맥북에서만)
      # - GRAPHQL_URL=https://stage-api.pojangboss.com/graphql/ # 스테이지
      # - GRAPHQL_URL=https://api.pojangboss.com/graphql/ # 프로덕션
      # Frontend URL (발주 확인 링크용)
      - MALL_URL=http://localhost:7000 # 로컬
      # - MALL_URL=https://stage.pojangboss.com # 스테이지
      # - MALL_URL=https://pojangboss.com # 프로덕션
      # Auth Token (로그인 후 개발자도구에서 복사)
      # 로컬 (맥북 DB용)
