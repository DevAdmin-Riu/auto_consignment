services:
  n8n:
    build:
      context: .
      dockerfile: Dockerfile.n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    volumes:
      - ./data:/home/node/.n8n
      - .:/home/node/vendor-automation
    environment:
      - TZ=Asia/Seoul
      # OAuth 콜백 URL (ngrok 사용 시)
      - WEBHOOK_URL=https://f3ae23d2780e.ngrok-free.app/
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
      - N8N_ALLOW_ENV_ACCESS=AUTH_TOKEN,GRAPHQL_URL,CONTENT_TYPE,MALL_URL
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # Allow external npm modules in Code node
      - NODE_FUNCTION_ALLOW_EXTERNAL=xlsx,xlsx-js-style
      # GraphQL API (아래 중 하나 선택)
      # - GRAPHQL_URL=https://resolutive-naoma-unideographically.ngrok-free.dev/graphql/ # 로컬
      - GRAPHQL_URL=https://api.pojangboss.com/graphql/ # 프로덕션
